<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roadmap interactivo — apuestas (TFM)</title>
    <style>
      :root{
        --bg:#ffffff;
        --text:#0f172a;
        --muted:#64748b;
        --border:#e5e7eb;
        --panel:#ffffff;
        --sidebar:#0f1117;
        --sidebar2:#121722;
        --sidebarText:#e5e7eb;
        --sidebarMuted:#94a3b8;
        --accent:#6366f1;
        --shadow: 0 10px 30px rgba(15,17,23,.10);
        --radius: 14px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        font-family:var(--sans);
        color:var(--text);
        background: linear-gradient(180deg, #ffffff 0%, #fbfbff 100%);
        overflow: hidden;
      }
      a{color:inherit}
      .app{
        height:100%;
        display:grid;
        grid-template-columns: 360px 1fr;
        overflow:hidden;
      }
      .sidebar{
        background: linear-gradient(180deg, var(--sidebar) 0%, #0b0e14 100%);
        color:var(--sidebarText);
        border-right:1px solid rgba(255,255,255,.06);
        display:flex;
        flex-direction:column;
        min-width:0;
        min-height:0;
        height:100%;
        overflow:hidden;
      }
      .sideTop{
        padding:16px 16px 12px 16px;
        border-bottom:1px solid rgba(255,255,255,.07);
      }
      .title{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:12px;
        margin-bottom:10px;
      }
      .titleLeft{display:flex; align-items:center; gap:10px; min-width:0}
      .logo{
        width:36px;height:36px;border-radius:10px;
        background: radial-gradient(circle at 30% 30%, rgba(99,102,241,.9), rgba(99,102,241,.15));
        box-shadow: 0 8px 18px rgba(99,102,241,.18);
        display:grid; place-items:center;
        flex:0 0 auto;
      }
      .logo span{font-weight:800; letter-spacing:.2px}
      .hgroup{min-width:0}
      .h1{
        font-size:14px;
        font-weight:800;
        margin:0;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
      }
      .sub{
        margin:0;
        font-size:12px;
        color:var(--sidebarMuted);
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
      }
      .btn{
        border:1px solid rgba(255,255,255,.10);
        background: rgba(255,255,255,.04);
        color: var(--sidebarText);
        border-radius:10px;
        padding:8px 10px;
        font-size:12px;
        cursor:pointer;
        transition: transform .12s ease, background .12s ease, border-color .12s ease;
        user-select:none;
        flex:0 0 auto;
      }
      .btn:hover{transform: translateY(-1px); background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.16)}
      .search{
        position:relative;
      }
      .search input{
        width:100%;
        border:1px solid rgba(255,255,255,.10);
        background: rgba(255,255,255,.04);
        color: var(--sidebarText);
        border-radius:12px;
        padding:10px 12px 10px 34px;
        outline:none;
        font-size:13px;
      }
      .search input::placeholder{color: rgba(229,231,235,.55)}
      .search .icon{
        position:absolute; left:12px; top:50%; transform: translateY(-50%);
        color: rgba(229,231,235,.70);
        font-size:14px;
      }
      .treeWrap{
        padding:10px 10px 14px 10px;
        overflow:auto;
        flex:1 1 auto;
        min-height:0;
      }
      .tree{
        font-size:13px;
        line-height:1.35;
      }
      .node{
        display:flex;
        align-items:center;
        gap:8px;
        padding:7px 10px;
        border-radius:10px;
        cursor:pointer;
        user-select:none;
        transition: background .12s ease, color .12s ease;
        min-width:0;
      }
      .node:hover{background: rgba(255,255,255,.05)}
      .node.selected{
        background: rgba(99,102,241,.20);
        outline: 1px solid rgba(99,102,241,.35);
      }
      .node .twisty{
        width:16px; text-align:center; color: rgba(229,231,235,.70);
        flex:0 0 auto;
      }
      .node .ficon{width:18px; text-align:center; flex:0 0 auto}
      .node .label{
        overflow:hidden;
        white-space:nowrap;
        text-overflow:ellipsis;
        flex:1 1 auto;
      }
      .indent{margin-left:16px; border-left:1px dashed rgba(255,255,255,.08); padding-left:10px}
      .pill{
        display:inline-flex;
        align-items:center;
        gap:6px;
        border:1px solid rgba(255,255,255,.12);
        background: rgba(255,255,255,.05);
        color: var(--sidebarText);
        padding:6px 10px;
        border-radius:999px;
        font-size:12px;
      }
      .sideFooter{
        padding:12px 16px;
        border-top:1px solid rgba(255,255,255,.07);
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
        color: var(--sidebarMuted);
        font-size:12px;
      }

      .main{
        min-width:0;
        min-height:0;
        height:100%;
        display:flex;
        flex-direction:column;
        overflow:hidden;
      }
      .topbar{
        position:sticky;
        top:0;
        z-index:10;
        background: rgba(255,255,255,.75);
        backdrop-filter: blur(10px);
        border-bottom:1px solid var(--border);
      }
      .topInner{
        padding:14px 18px;
        display:flex;
        align-items:center;
        gap:12px;
        justify-content:space-between;
      }
      .stackToggle{
        display:flex; align-items:center; gap:10px; min-width:0;
      }
      .stackTitle{
        font-weight:800; font-size:14px; margin:0;
        white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      }
      .muted{color:var(--muted)}
      .statsRow{
        padding: 0 18px 14px 18px;
        display:grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap:12px;
      }
      .stat{
        border:1px solid var(--border);
        background: var(--panel);
        border-radius:14px;
        padding:12px 12px;
        box-shadow: 0 8px 20px rgba(15,23,42,.05);
        min-width:0;
      }
      .stat .k{
        font-size:12px; color:var(--muted);
        margin:0 0 6px 0;
      }
      .stat .v{
        font-size:18px; font-weight:900; margin:0;
        letter-spacing:-.2px;
      }
      .content{
        padding:18px;
        display:grid;
        grid-template-columns: 1fr;
        gap:14px;
        flex:1 1 auto;
        min-height:0;
        overflow:auto;
      }
      .card{
        border:1px solid var(--border);
        background: var(--panel);
        border-radius: var(--radius);
        padding:16px;
        box-shadow: var(--shadow);
        min-width:0;
      }
      .cardHeader{
        display:flex;
        align-items:flex-start;
        justify-content:space-between;
        gap:12px;
        margin-bottom:10px;
      }
      .cardHeader h2{
        font-size:14px;
        margin:0;
        font-weight:900;
      }
      .path{
        font-family: var(--mono);
        font-size:12px;
        color: #334155;
        background:#f1f5f9;
        border:1px solid #e2e8f0;
        padding:6px 10px;
        border-radius:999px;
        display:inline-flex;
        align-items:center;
        gap:8px;
        overflow:hidden;
        max-width:100%;
      }
      .badge{
        display:inline-flex;
        align-items:center;
        font-size:12px;
        font-weight:800;
        padding:7px 10px;
        border-radius:999px;
        border:1px solid transparent;
        white-space:nowrap;
      }
      .badge.comp{background: rgba(99,102,241,.12); border-color: rgba(99,102,241,.30); color:#3730a3}
      .badge.route{background: rgba(20,184,166,.12); border-color: rgba(20,184,166,.30); color:#0f766e}
      .badge.cfg{background: rgba(245,158,11,.14); border-color: rgba(245,158,11,.32); color:#92400e}
      .badge.model{background: rgba(244,63,94,.12); border-color: rgba(244,63,94,.30); color:#9f1239}
      .badge.util{background: rgba(100,116,139,.14); border-color: rgba(100,116,139,.32); color:#334155}
      .badge.test{background: rgba(34,197,94,.14); border-color: rgba(34,197,94,.32); color:#166534}
      .badge.style{background: rgba(236,72,153,.12); border-color: rgba(236,72,153,.30); color:#9d174d}
      .badge.doc{background: rgba(148,163,184,.18); border-color: rgba(148,163,184,.35); color:#334155}
      .badge.asset{background: rgba(71,85,105,.12); border-color: rgba(71,85,105,.28); color:#334155}
      .badge.other{background: rgba(148,163,184,.18); border-color: rgba(148,163,184,.35); color:#334155}
      .grid2{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap:12px;
      }
      .kv{
        display:flex;
        flex-direction:column;
        gap:6px;
        min-width:0;
      }
      .kv .k{font-size:12px; color:var(--muted); margin:0}
      .kv .v{font-size:13px; margin:0; color:#0f172a}
      .list{
        margin:0;
        padding-left:18px;
        color:#0f172a;
        font-size:13px;
      }
      .chips{
        display:flex;
        flex-wrap:wrap;
        gap:8px;
        margin-top:8px;
      }
      .chip{
        font-size:12px;
        padding:6px 10px;
        border-radius:999px;
        background:#f8fafc;
        border:1px solid #e2e8f0;
        color:#0f172a;
        max-width:100%;
      }
      .chip b{font-weight:900}
      .stackPanel{
        display:none;
        border-top:1px solid var(--border);
        background:#ffffff;
      }
      .stackPanel.open{display:block}
      .stackInner{
        padding:14px 18px 18px 18px;
      }
      .layer{
        margin-top:10px;
      }
      .layer h3{
        margin:0 0 8px 0;
        font-size:12px;
        letter-spacing:.08em;
        text-transform:uppercase;
        color:#475569;
      }
      .fade{
        opacity:0;
        transform: translateY(6px);
        transition: opacity .18s ease, transform .18s ease;
      }
      .fade.show{opacity:1; transform: translateY(0)}
      .empty{
        padding:10px 0;
        color: var(--muted);
        font-size:13px;
      }
      .hint{
        color: var(--muted);
        font-size:13px;
        margin:0;
      }
      @media (max-width: 980px){
        .app{grid-template-columns: 320px 1fr}
        .statsRow{grid-template-columns: repeat(2, minmax(0, 1fr))}
      }
      @media (max-width: 768px){
        body{overflow:auto}
        .app{grid-template-columns: 1fr}
        .sidebar{
          position:sticky;
          top:0;
          z-index:20;
          max-height: 50vh;
        }
        .treeWrap{max-height: calc(50vh - 120px)}
        .main{overflow:visible; height:auto}
        .content{overflow:visible}
        .grid2{grid-template-columns:1fr}
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sideTop">
          <div class="title">
            <div class="titleLeft">
              <div class="logo" title="Roadmap">
                <span>RM</span>
              </div>
              <div class="hgroup">
                <p class="h1">Roadmap interactivo</p>
                <p class="sub">apuestas — TFM (arquitectura)</p>
              </div>
            </div>
            <button class="btn" id="btnHome" title="Volver a vista general">Vista general</button>
          </div>
          <div class="search">
            <span class="icon">⌕</span>
            <input id="search" type="text" placeholder="Buscar ficheros y carpetas…" autocomplete="off" />
          </div>
          <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap">
            <span class="pill" id="pillCounts">—</span>
            <span class="pill" id="pillSelected">Sin selección</span>
          </div>
        </div>
        <div class="treeWrap">
          <div class="tree" id="tree"></div>
        </div>
        <div class="sideFooter">
          <span id="footerHint">Click en un fichero para ver detalles</span>
          <span style="font-family:var(--mono)">vanilla</span>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div class="topInner">
            <div class="stackToggle">
              <button class="btn" id="btnStack">Stack</button>
              <p class="stackTitle" id="mainTitle">Estado general</p>
            </div>
            <div class="muted" id="mainSubtitle" style="font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
              Selecciona un fichero para ver su rol, exports e imports
            </div>
          </div>
          <div class="stackPanel open" id="stackPanel">
            <div class="stackInner">
              <div id="stackLayers"></div>
            </div>
          </div>
          <div class="statsRow" id="statsRow"></div>
        </div>
        <div class="content">
          <div class="card fade show" id="detailCard">
            <div id="detailInner"></div>
          </div>
        </div>
      </main>
    </div>

          "frontend/src/utils/registeredMatches.test.js": { type:"test", badge:"test", what:"Tests Vitest del cliente de partidos que simulan el backend con un store en memoria. Cubre alta/baja, duplicados, id vacío y respuestas de error para asegurar contrato estable. Protege la parte de OracleMock y creación de porras que depende de estos endpoints.", exports:["tests"], deps:["vitest","fetch stubs"] },
          "frontend/src/types/nav.ts": { type:"tipos", badge:"other", what:"Tipos TypeScript para describir entradas de navegación de la TopBar (rutas vs acciones). Mantiene tipado de callbacks y propiedades comunes sin meter lógica. Ayuda a que el componente TopBar sea más mantenible.", exports:["NavRouteItem","NavActionItem","TopBarNavEntry"], deps:["react types"] },
          "frontend/src/index.css": { type:"estilos", badge:"style", what:"Estilos globales del frontend e import de Tailwind v4. Define variables, clases y ajustes de layout para la dApp (topbar, botones, contenedores). Complementa `App.css` para estilos más específicos de páginas.", exports:["CSS global + @import tailwindcss"], deps:["Tailwind CSS"] },
          "frontend/src/App.css": { type:"estilos", badge:"style", what:"Hoja de estilos principal con reglas extensas para componentes visuales y páginas (cards, forms, layout de detalle, leaderboard, etc.). Aporta la estética final de la dApp sin depender de frameworks CSS externos adicionales. Consolida estilos específicos que no son solo utilidades.", exports:["CSS de UI"], deps:["CSS"] },
          "frontend/public/vite.svg": { type:"otros", badge:"asset", what:"Asset SVG incluido por el template de Vite para iconografía/base. No afecta a la lógica del proyecto pero forma parte de la carpeta `public`. Puede usarse como favicon o recurso estático.", exports:[], deps:["SVG"] },
          "frontend/src/assets/react.svg": { type:"otros", badge:"asset", what:"Asset SVG de React usado en la plantilla o como recurso visual. No contiene lógica del TFM; es un recurso estático. Se incluye para completar el build de assets.", exports:[], deps:["SVG"] },

          // Solidity contracts

          "src/PorraFactory.sol": { type:"modelo", badge:"model", what:"Factory que despliega porras (WhitelistManager + PorraGame) y registra por creador/participante para listados. Emite `PorraCreated`, que el frontend decodifica para obtener la dirección de la porra recién creada. Permite actualizar el oráculo global con control de owner.", exports:["contract PorraFactory"], deps:["PorraGame","WhitelistManager","Ownable"] },

          // Deploy scripts
          "script/Deploy.s.sol": { type:"otros", badge:"other", what:"Script Foundry para desplegar MockOracle y PorraFactory y mostrar direcciones. Se usa para arrancar local (Anvil) o desplegar en testnet ajustando RPC/PK. Reduce pasos manuales y errores de copia/pega.", exports:["forge script deploy"], deps:["forge-std Script/console"] },
          "script/DeployAndCreatePorra.s.sol": { type:"otros", badge:"other", what:"Script Foundry que despliega y crea una porra de ejemplo con 3 participantes y stake de 5 ETH, incluyendo una apuesta inicial. Sirve como smoke test reproducible del flujo que luego usa el frontend. Útil para preparar demos rápidas.", exports:["forge script deploy+create"], deps:["forge-std Script/console"] },

          // Solidity tests
          "test/MockOracle.t.sol": { type:"test", badge:"test", what:"Tests de MockOracle: valida set/get y condiciones de error (outcome inválido, restricciones). Asegura que el oráculo de desarrollo se comporta como espera el juego. Sirve como base del pipeline CI de Solidity.", exports:["forge tests"], deps:["Foundry test framework"] },
          "test/WhitelistManager.t.sol": { type:"test", badge:"test", what:"Tests de WhitelistManager: cubre validaciones del constructor, add/remove, límites y casos de datos inconsistentes. Garantiza que la whitelist y motes no se corrompen. Protege UX y seguridad del juego.", exports:["forge tests"], deps:["Foundry test framework"] },
          "test/PorraGame.t.sol": { type:"test", badge:"test", what:"Tests de PorraGame: apuesta, transición de estados, resolución con oráculo, fallback manual, y reclamación de premios (incluye caso sin ganadores). Usa `warp` para simular tiempos y valida que los pagos son correctos. Refuerza las invariantes económicas del contrato.", exports:["forge tests"], deps:["Foundry test framework"] },
          "test/PorraFactory.t.sol": { type:"test", badge:"test", what:"Tests de PorraFactory: creación, evento `PorraCreated`, y listados por creador/participante. Verifica que la fábrica registra correctamente las porras para que el frontend pueda listarlas. Alinea el flujo de la UI con el contrato.", exports:["forge tests"], deps:["Foundry test framework"] }
        }
      };

      function slugTypeToBadgeClass(type) {
        const t = String(type || "").toLowerCase();
        if (t === "componente") return "comp";
        if (t === "ruta" || t === "backend-api" || t === "backend-api-dup") return "route";
        if (t === "config") return "cfg";
        if (t === "modelo" || t === "contratos-frontend" || t === "contrato") return "model";
        if (t === "util" || t === "hook") return "util";
        if (t === "test" || t === "test-sol") return "test";
        if (t === "estilos") return "style";
        if (t === "docs") return "doc";
        if (t === "entrada") return "other";
        if (t === "otros") return "other";
        return "other";
      }

      const ICONS_BY_EXT = {
        "sol": "⛓️",
        "s.sol": "🚀",
        "t.sol": "🧪",
        "mjs": "🟨",
        "js": "🟨",
        "jsx": "⚛️",
        "ts": "🟦",
        "tsx": "⚛️",
        "css": "🎨",
        "yml": "⚙️",
        "yaml": "⚙️",
        "json": "🧩",
        "md": "📘",
        "html": "🌐",
        "svg": "🖼️",
        "toml": "⚙️",
        "txt": "📄",
        "lock": "🔒"
      };

      function extOf(p){
        const name = p.split("/").pop() || p;
        if (name.endsWith(".t.sol")) return "t.sol";
        if (name.endsWith(".s.sol")) return "s.sol";
        const i = name.lastIndexOf(".");
        return i === -1 ? "" : name.slice(i+1).toLowerCase();
      }
      function iconForPath(p, isDir){
        if (isDir) return "📁";
        const e = extOf(p);
        return ICONS_BY_EXT[e] || "📄";
      }

      function buildTreeFromPaths(paths){
        const root = { name:"(root)", path:"", isDir:true, children:new Map() };
        for (const full of paths){
          const parts = full.split("/").filter(Boolean);
          let cur = root;
          let acc = "";
          for (let i=0;i<parts.length;i++){
            const part = parts[i];
            acc = acc ? (acc + "/" + part) : part;
            const isLast = i === parts.length-1;
            const isDir = !isLast ? true : false;
            if (!cur.children.has(part)){
              cur.children.set(part, { name:part, path:acc, isDir, children:new Map() });
            }
            cur = cur.children.get(part);
            if (isLast) cur.isDir = false;
          }
        }
        return root;
      }

      const state = {
        expanded: new Set(["api","frontend","src","test","script","frontend/src","frontend/src/pages","frontend/src/components","frontend/src/utils","frontend/api","frontend/api/sports","api/sports","api/sports/results","frontend/api/sports/results","src/utils","src/interfaces","explicacion_contratos",".github",".github/workflows"]),
        selectedPath: null,
        query: ""
      };

      const els = {
        tree: document.getElementById("tree"),
        search: document.getElementById("search"),
        btnHome: document.getElementById("btnHome"),
        btnStack: document.getElementById("btnStack"),
        stackPanel: document.getElementById("stackPanel"),
        stackLayers: document.getElementById("stackLayers"),
        statsRow: document.getElementById("statsRow"),
        detailInner: document.getElementById("detailInner"),
        pillCounts: document.getElementById("pillCounts"),
        pillSelected: document.getElementById("pillSelected"),
        mainTitle: document.getElementById("mainTitle"),
        mainSubtitle: document.getElementById("mainSubtitle"),
        footerHint: document.getElementById("footerHint")
      };

      function normalizeQuery(q){
        return String(q||"").trim().toLowerCase();
      }
      function matchesQuery(nodePath, nodeName, q){
        if (!q) return true;
        const hay = (nodePath + " " + nodeName).toLowerCase();
        return hay.includes(q);
      }
      function anyDescendantMatches(node, q){
        for (const child of node.children.values()){
          if (matchesQuery(child.path, child.name, q)) return true;
          if (child.isDir && anyDescendantMatches(child, q)) return true;
        }
        return false;
      }
      function sortChildren(map){
        const arr = Array.from(map.values());
        arr.sort((a,b)=>{
          if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;
          return a.name.localeCompare(b.name);
        });
        return arr;
      }

      function renderTree(){
        const q = state.query;
        const root = buildTreeFromPaths(PROJECT.paths);
        els.tree.innerHTML = "";

        function renderNode(node, depth){
          if (node.path && !matchesQuery(node.path, node.name, q)){
            if (!(node.isDir && anyDescendantMatches(node, q))) return null;
          }
          const row = document.createElement("div");
          row.className = "node" + (state.selectedPath === node.path ? " selected" : "");
          row.style.marginLeft = (depth*2) + "px";
          row.dataset.path = node.path;
          row.dataset.isdir = String(node.isDir);

          const twisty = document.createElement("div");
          twisty.className = "twisty";
          const expanded = node.isDir && state.expanded.has(node.path || "(root)");
          twisty.textContent = node.isDir ? (expanded ? "▾" : "▸") : " ";
          row.appendChild(twisty);

          const ic = document.createElement("div");
          ic.className = "ficon";
          ic.textContent = iconForPath(node.path || node.name, node.isDir);
          row.appendChild(ic);

          const label = document.createElement("div");
          label.className = "label";
          label.textContent = node.name;
          row.appendChild(label);

          row.addEventListener("click", (e)=>{
            e.stopPropagation();
            const isKnownFile = Boolean(node.path && PROJECT.files && PROJECT.files[node.path]);
            const isFolder = Boolean(node.isDir) && !isKnownFile;
            if (isFolder){
              const key = node.path || "(root)";
              if (state.expanded.has(key)) state.expanded.delete(key);
              else state.expanded.add(key);
              renderTree();
              return;
            }
            selectFile(node.path);
          });

          const container = document.createElement("div");
          container.appendChild(row);

          if (node.isDir){
            const key = node.path || "(root)";
            const shouldShowChildren = state.expanded.has(key) || q;
            if (shouldShowChildren){
              const wrap = document.createElement("div");
              wrap.className = depth === 0 ? "" : "indent";
              for (const child of sortChildren(node.children)){
                const childEl = renderNode(child, depth+1);
                if (childEl) wrap.appendChild(childEl);
              }
              if (wrap.childNodes.length) container.appendChild(wrap);
            }
          }
          return container;
        }

        // Render root children (no root line).
        for (const child of sortChildren(root.children)){
          const el = renderNode(child, 0);
          if (el) els.tree.appendChild(el);
        }
      }

      function renderStack(){
        els.stackLayers.innerHTML = "";
        for (const [layerName, items] of Object.entries(PROJECT.stack)){
          const layer = document.createElement("div");
          layer.className = "layer";
          const h = document.createElement("h3");
          h.textContent = layerName;
          layer.appendChild(h);
          const chips = document.createElement("div");
          chips.className = "chips";
          for (const t of items){
            const c = document.createElement("div");
            c.className = "chip";
            c.innerHTML = "<b>" + escapeHtml(t.name) + "</b>" + " <span class='muted' style='font-size:12px'>(" + escapeHtml(t.version) + ")</span><div class='muted' style='margin-top:4px; font-size:12px'>" + escapeHtml(t.why) + "</div>";
            chips.appendChild(c);
          }
          layer.appendChild(chips);
          els.stackLayers.appendChild(layer);
        }
      }

      function renderStats(){
        els.pillCounts.textContent = PROJECT.stats.files + " ficheros • " + PROJECT.stats.folders + " carpetas";
        els.statsRow.innerHTML = "";
        const items = [
          { k: "Ficheros", v: String(PROJECT.stats.files) },
          { k: "Carpetas", v: String(PROJECT.stats.folders) },
          { k: "Líneas (aprox.)", v: String(PROJECT.stats.locApprox) },
          { k: "Componentes / Rutas / Contratos", v: PROJECT.stats.countsByType.componente + " / " + PROJECT.stats.countsByType.ruta + " / " + PROJECT.stats.countsByType.modelo }
        ];
        for (const it of items){
          const d = document.createElement("div");
          d.className = "stat";
          d.innerHTML = "<p class='k'>" + escapeHtml(it.k) + "</p><p class='v'>" + escapeHtml(it.v) + "</p>";
          els.statsRow.appendChild(d);
        }
      }

      function fileMeta(path){
        return PROJECT.files[path] || null;
      }

      function selectFile(path){
        if (!path) return;
        state.selectedPath = path;
        els.pillSelected.textContent = "Seleccionado: " + (path.split("/").pop() || path);
        els.footerHint.textContent = "Archivo seleccionado";
        renderTree();
        renderDetail(path);
      }

      function resetToGeneral(){
        state.selectedPath = null;
        els.pillSelected.textContent = "Sin selección";
        els.footerHint.textContent = "Click en un fichero para ver detalles";
        els.mainTitle.textContent = "Estado general";
        els.mainSubtitle.textContent = "Stack + estadísticas del proyecto";
        els.stackPanel.classList.add("open");
        renderTree();
        renderGeneralDetail();
      }

      function renderGeneralDetail(){
        const counts = PROJECT.stats.countsByType;
        const breakdown = Object.entries(counts)
          .sort((a,b)=> b[1]-a[1])
          .map(([k,v])=> ({k, v}));

        const rows = breakdown.map(x=> "<div class='chip'><b>" + escapeHtml(x.k) + "</b> <span class='muted'>(" + x.v + ")</span></div>").join("");

        els.detailInner.innerHTML = `
          <div class="cardHeader">
            <div style="min-width:0">
              <h2>Visión general</h2>
              <p class="hint">Este roadmap está hardcodeado tras escanear el repo y leer el código propio (sin dependencias/artefactos).</p>
            </div>
            <span class="badge other">Proyecto</span>
          </div>
          <div class="grid2">
            <div class="kv">
              <p class="k">Repositorio</p>
              <p class="v"><span class="path" title="${escapeHtml(PROJECT.root)}">📦 ${escapeHtml(PROJECT.root)}</span></p>
            </div>
            <div class="kv">
              <p class="k">Cómo usar</p>
              <p class="v">Busca, expande carpetas y selecciona un fichero para ver rol, exports e imports.</p>
            </div>
          </div>
          <div style="margin-top:12px">
            <p class="k muted" style="margin:0 0 8px 0; font-size:12px">Conteos por tipo</p>
            <div class="chips">${rows}</div>
          </div>
          <div style="margin-top:12px">
            <p class="k muted" style="margin:0 0 8px 0; font-size:12px">Notas</p>
            <ul class="list">
              <li>Los endpoints existen duplicados: producción en <span style="font-family:var(--mono)">api/</span> y local en <span style="font-family:var(--mono)">frontend/api/</span> (reusados por express).</li>
              <li>El flujo clave es DB (Postgres) → fulfill (server) → <span style="font-family:var(--mono)">MockOracle.setResult</span> → resolución on-chain en <span style="font-family:var(--mono)">PorraGame</span>.</li>
            </ul>
          </div>
        `;
      }

      function renderDetail(path){
        try {
          const safePath = String(path || "");
          const meta = fileMeta(safePath);
          const name = (safePath.split("/").pop() || safePath);
          const isKnown = Boolean(meta);
          const type = isKnown ? meta.type : "otros";
          const badgeClass = slugTypeToBadgeClass(type);

          els.mainTitle.textContent = name;
          els.mainSubtitle.textContent = safePath;
          els.stackPanel.classList.remove("open");

          const exportsHtml = (meta && meta.exports && meta.exports.length)
            ? ("<ul class='list'>" + meta.exports.map(x=> "<li>" + escapeHtml(x) + "</li>").join("") + "</ul>")
            : "<div class='empty'>No aplica o no expone exports relevantes.</div>";

          const depsHtml = (meta && meta.deps && meta.deps.length)
            ? ("<div class='chips'>" + meta.deps.map(x=> "<div class='chip'>" + escapeHtml(x) + "</div>").join("") + "</div>")
            : "<div class='empty'>Sin imports/deps destacables (o fichero de recursos/config).</div>";

          let ico = "📄";
          try { ico = iconForPath(safePath,false); } catch {}

          els.detailInner.innerHTML = `
            <div class="cardHeader">
              <div style="min-width:0">
                <h2>Detalle de fichero</h2>
                <div class="path" title="${escapeHtml(safePath)}">${escapeHtml(ico)} ${escapeHtml(safePath)}</div>
              </div>
              <span class="badge ${badgeClass}">${escapeHtml(type)}</span>
            </div>
            <div class="grid2">
              <div class="kv">
                <p class="k">Qué hace</p>
                <p class="v">${escapeHtml(isKnown ? meta.what : "Fichero no indexado en el resumen. Forma parte del repo, pero no se detectó metadato específico en este roadmap.")}</p>
              </div>
              <div class="kv">
                <p class="k">Tipo</p>
                <p class="v">${escapeHtml(type)}</p>
              </div>
            </div>
            <div style="margin-top:12px">
              <p class="k muted" style="margin:0 0 8px 0; font-size:12px">Exports / piezas principales</p>
              ${exportsHtml}
            </div>
            <div style="margin-top:12px">
              <p class="k muted" style="margin:0 0 8px 0; font-size:12px">Dependencias / imports (resumen)</p>
              ${depsHtml}
            </div>
          `;
        } catch (err) {
          const msg = err instanceof Error ? (err.message + (err.stack ? "\n" + err.stack : "")) : String(err);
          els.detailInner.innerHTML = `
            <div class="cardHeader">
              <div style="min-width:0">
                <h2>Detalle de fichero</h2>
                <p class="hint">Se produjo un error renderizando el detalle. Este bloque ayuda a diagnosticarlo.</p>
              </div>
              <span class="badge other">error</span>
            </div>
            <div class="path" style="white-space:pre-wrap; border-radius:14px">${escapeHtml(msg)}</div>
          `;
        }

        const card = document.getElementById("detailCard");
        card.classList.remove("show");
        requestAnimationFrame(()=> card.classList.add("show"));
      }

      function escapeHtml(s){
        return String(s).replace(/[&<>"']/g, (c)=>({
          "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
        }[c]));
      }

      els.search.addEventListener("input", ()=>{
        state.query = normalizeQuery(els.search.value);
        renderTree();
      });

      els.btnHome.addEventListener("click", ()=>{
        resetToGeneral();
      });

      els.btnStack.addEventListener("click", ()=>{
        els.stackPanel.classList.toggle("open");
      });

      // Init
      renderStack();
      renderStats();
      renderTree();
      resetToGeneral();
    </script>
  </body>
</html>
